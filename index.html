<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MATTEO FERRONI Architecture</title>
  <style>
    :root {
      --bg: #ffffff;
      --fg: #111111;
      --muted: #666666;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: monospace;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    main {
      width: 100%;
      max-width: 900px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(1rem, 3vw, 2rem);
      font-weight: 100;
      letter-spacing: 0.08em;
      line-height: 1.3;
    }

    p {
      margin: 18px 0 0;
      font-size: clamp(1rem, 2vw, 1.2rem);
      color: var(--muted);
      line-height: 1.6;
    }
    a {
      font-size: clamp(1rem, 2vw, 1.2rem);
      color: var(--muted);
      text-decoration: none;
    }

    a:hover {
       text-decoration: underline;
    }
  </style>
</head>
<body>
  <main>
    <h1>MATTEO FERRONI Architecture</h1>
    <p></p>
    <a href="mailto:hello@matteoferroni.com">hello@matteoferroni.com</a>  
  </main>
</body>
</html>
